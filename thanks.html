<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дякуємо! | EEG Гарнітура</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: #ffffff;
            background-color: #050a18;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(20, 229, 228, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            color: #14e5e4;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(90deg, #14e5e4 0%, #0dbfb1 100%);
            color: #050a18;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(20, 229, 228, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✨</div>
        <h1>Дякуємо!</h1>
        <p>Ваше замовлення прийнято. Ми зв'яжемося з вами, як тільки гарнітура буде готова до відправки.</p>
        <a href="index.html" class="btn">ПОВЕРНУТИСЬ НА ГОЛОВНУ</a>
    </div>
</body>
</html>
